<section>

<h2>Student Registration Form</h2>

<form>

<label for="name">Full Name</label>

<br>

<input type="text"
id="name"
required>

<br><br>

<label for="email">Email</label>

<br>

<input type="email"
id="email"
required>

<br><br>

<label for="mobile">Mobile Number</label>

<br>

<input type="tel"
id="mobile">

<br><br>

<label for="course">Course</label>

<br>

<select id="course">

<option>BCA</option>

<option>BBA</option>

<option>B.Com</option>

<option>B.Sc</option>

</select>

<br><br>

<label for="password">Password</label>

<br>

<input type="password"
id="password"
required>

<br><br>

<input type="submit"
value="Register">

<input type="reset"
value="Clear">

</form>

</section>
